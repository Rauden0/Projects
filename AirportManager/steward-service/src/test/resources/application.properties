server.port=8079
spring.application.name=Steward Service
spring.jpa.open-in-view=false
spring.datasource.url=jdbc:h2:mem:steward-service
spring.datasource.driverClassName=org.h2.Driver

airport_manager.events.change.steward.listeners=steward-changes-for-flight-service
airport_manager.events.other.stewardAssignment.listeners=steward-assignments-for-flight-service
airport_manager.consistency.events.required=false

spring.artemis.mode=embedded
spring.artemis.embedded.enabled=true
spring.artemis.embedded.queues=\
    steward-changes-for-flight-service,\
    steward-assignments-for-flight-service, \
    flight-changes-for-steward-service
spring.jms.pub-sub-domain=false

spring.profiles.active=test

seedData=false
