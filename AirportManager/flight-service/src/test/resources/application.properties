spring.application.name=FlightService
server.port=8080
logging.level.org.springframework.web=DEBUG
airport.service.url=http://localhost:8081
steward.service.url=http://localhost:8079
spring.devtools.restart.enabled=true
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{appName}] [%level] %logger{36} - %msg%n

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

spring.artemis.mode=embedded
spring.artemis.embedded.enabled=true
spring.artemis.embedded.server.enabled=true
spring.artemis.embedded.server.management-enabled=false
spring.artemis.embedded.queues=flight-changes-for-steward-service
spring.jms.pub-sub-domain=false

