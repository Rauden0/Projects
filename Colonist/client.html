<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Colonist Clone Debugger</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #0f0; padding: 20px; }
        .container { display: flex; gap: 20px; }
        .controls { width: 300px; display: flex; flex-direction: column; gap: 10px; }
        .logs { flex-grow: 1; border: 1px solid #444; height: 80vh; overflow-y: scroll; padding: 10px; background: #000; }
        input, button { padding: 8px; background: #333; color: white; border: 1px solid #555; cursor: pointer; }
        button:hover { background: #444; }
        .sent { color: #aaa; }
        .received { color: #0f0; }
        h2 { margin-top: 0; }
    </style>
</head>
<body>

<h1>🏰 Colonist Rust API Tester</h1>
<div id="status" style="color: red; margin-bottom: 10px;">🔴 Disconnected</div>

<div class="container">
    <div class="controls">
        <h2>Actions</h2>

        <input type="text" id="playerId" placeholder="Player UUID">
        <input type="text" id="gameId" placeholder="Game ID" value="room-1">

        <button onclick="sendAction('JOIN_GAME')">Join Game</button>
        <button onclick="sendAction('ROLL_DICE')">Roll Dice</button>
        <button onclick="sendAction('BUILD_SETTLEMENT')">Build Settlement</button>
        <button onclick="sendAction('BUILD_CITY')">Build City</button>
        <button onclick="sendAction('BUILD_ROAD')">Build Road</button>
        <button onclick="sendAction('END_TURN')">End Turn</button>
        <button onclick="sendAction('REQUEST_RES')">Request Resources</button>

        <hr>
        <button onclick="connect()" style="background: #004400;">Reconnect</button>
    </div>

    <div class="logs" id="logBox"></div>
</div>

<script>
    let ws;

    function connect() {
        ws = new WebSocket("ws://127.0.0.1:8080/ws/");

        ws.onopen = () => {
            document.getElementById("status").innerText = "🟢 Connected";
            document.getElementById("status").style.color = "#0f0";
            log("System", "Connection established.");
        };

        ws.onclose = () => {
            document.getElementById("status").innerText = "🔴 Disconnected";
            document.getElementById("status").style.color = "red";
            log("System", "Connection lost.");
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                log("Server", JSON.stringify(data, null, 2), "received");
            } catch (e) {
                log("Server", event.data, "received");
            }
        };
    }

    function sendAction(type) {
        const pid = document.getElementById("playerId").value;

        let msg;

        switch (type) {
            case 'JOIN_GAME':
                msg = {
                    type: "JOIN_GAME",
                    payload: { _player_id: pid }
                };
                break;

            case 'ROLL_DICE':
                msg = { type: "ROLL_DICE" };
                break;

            case 'BUILD_SETTLEMENT':
                msg = {
                    type: "BUILD_SETTLEMENT",
                    payload: { x: 0, y: 0 }
                };
                break;

            case 'BUILD_CITY':
                msg = {
                    type: "BUILD_CITY",
                    payload: { x: 0, y: 0 }
                };
                break;

            case 'BUILD_ROAD':
                msg = {
                    type: "BUILD_ROAD",
                    payload: { x1: 0, y1: 0, x2: 1, y2: 0 }
                };
                break;

            case 'END_TURN':
                msg = { type: "END_TURN" };
                break;

            case 'REQUEST_RES':
                msg = { type: "REQUEST_RESOURCES" };
                break;

            default:
                return;
        }

        ws.send(JSON.stringify(msg));
        log("Client", JSON.stringify(msg), "sent");
    }

    function log(who, text, type) {
        const box = document.getElementById("logBox");
        const entry = document.createElement("div");
        entry.className = type;
        entry.innerHTML = `<strong>${who}:</strong> <pre>${text}</pre>`;
        box.prepend(entry);
    }

    connect();
</script>

</body>
</html>
